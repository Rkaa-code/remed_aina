<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>E-Katalog Toko Buku</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-amber-50">

  <!-- Navbar -->
  <nav class="bg-amber-900 text-white p-5 shadow-lg sticky top-0 z-50">
    <div class="max-w-7xl mx-auto flex flex-wrap justify-between items-center gap-3">

      <h1 class="text-2xl font-bold">
        📚 Toko Buku Aina
      </h1>

      <div class="flex gap-2 flex-wrap">

        <button class="genre-btn bg-amber-700 px-3 py-2 rounded" data-genre="Semua">Semua</button>

        <button class="genre-btn bg-amber-700 px-3 py-2 rounded" data-genre="Pelajaran & UTBK">
          Pelajaran
        </button>

        <button class="genre-btn bg-amber-700 px-3 py-2 rounded" data-genre="Novel & Fiksi">
          Novel
        </button>

        <button class="genre-btn bg-amber-700 px-3 py-2 rounded" data-genre="Komik & Manga">
          Komik
        </button>

        <button class="genre-btn bg-amber-700 px-3 py-2 rounded" data-genre="Self Improvement">
          Self Improvement
        </button>

        <button class="genre-btn bg-amber-700 px-3 py-2 rounded" data-genre="Buku Anak">
          Buku Anak
        </button>

      </div>

      <div class="font-bold">
        🛒 Keranjang:
        <span id="keranjang">0</span>
      </div>

    </div>
  </nav>

  <!-- Search -->
  <section class="max-w-7xl mx-auto p-5">

    <input
      type="text"
      id="search"
      placeholder="Cari judul, penulis, atau penerbit..."
      class="w-full p-3 rounded-lg border border-gray-300 shadow"
    >

  </section>

  <!-- Katalog -->
  <section class="max-w-7xl mx-auto p-5">

    <div
      id="buku-container"
      class="grid md:grid-cols-3 lg:grid-cols-4 gap-6"
    ></div>

  </section>

  <script src="buku-data.js"></script>
  <script src="script.js"></script>

</body>
</html>
